### NOTE: Update 01-23-2026, the default.conf file bundled with the NGINX docker image is no longer used
### Rather, an updated "default.conf" located on the EC2 instance home directory is used instead to enable HTTPS
### This prevents the need to re-create and re-push a new image each time a modification is made to the conf file

# New config file 04-17-2025 (bundling React with NGINX docker image for deployment onto EC2)
# Basic configuration structure
# events {} # REMOVE -- causes crash

server {
    listen 80;                  # Listen on port 80 for incoming connections
    server_name localhost;      # Adjust if needed, usually fine in Docker

    # Serve React App (Root Location)
    location / {
        root   /usr/share/nginx/html;       # Directory where React build files are copied
        index  index.html;                  # Default file to serve
        # CRITICAL for Single Page Apps (React Router):
        # If a requested file/path isn't found, serve index.html
        # This lets React handle the routing client-side.
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Node service
    location /api/ {
        # Forward the request to the 'node' service on port 8080
        # The name 'node' comes from your docker-compose service name
        proxy_pass http://node:8080/api/; # Pass the '/api/' part too

        # If Node app doesn't expect the '/api/' prefix, use a rewrite:
        # rewrite ^/api/(.*)$ /$1 break;
        # proxy_pass http://node:8080/; # And change proxy_pass to end with /

        # Set standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600;
    }

    # Optional: Add error pages, logging, etc. as needed
    # error_page   500 502 503 504  /50x.html;
    # location = /50x.html {
    #    root   /usr/share/nginx/html;
    # }
}